name: Build APK
run-name: "RaceNav ${{ github.event.head_commit.message }}"

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/racenav-release.jks

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK (signed with persistent key)
        env:
          KEYSTORE_PATH: /tmp/racenav-release.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Get version name
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | grep -oP '"[^"]+"' | tr -d '"')
          echo "name=v$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/racenav-${{ steps.version.outputs.name }}.apk

      - name: Upload artifact (every build)
        uses: actions/upload-artifact@v4
        with:
          name: RaceNav-${{ steps.version.outputs.name }}-build${{ github.run_number }}
          path: app/build/outputs/apk/debug/racenav-${{ steps.version.outputs.name }}.apk
          retention-days: 14

      - name: Deploy APK to server (every build)
        uses: appleboy/scp-action@v0.1.7
        continue-on-error: true
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          password: ${{ secrets.DEPLOY_PASSWORD }}
          source: app/build/outputs/apk/debug/racenav-${{ steps.version.outputs.name }}.apk
          target: /opt/server-monitor/public/
          strip_components: 4

      - name: Create GitHub Release (on tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Trophy Navigator ${{ github.ref_name }}
          files: app/build/outputs/apk/debug/racenav-${{ steps.version.outputs.name }}.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
