# RaceNav Tile Proxy — nginx configuration
# Generated 2026-03-17

# --- Cache setup ---
proxy_cache_path /var/cache/nginx/tiles levels=1:2 keys_zone=tilecache:50m
                 max_size=10g inactive=7d use_temp_path=off;

# --- Rate limiting ---
limit_req_zone $binary_remote_addr zone=tilerl:10m rate=100r/s;

# --- Upstream defaults ---
proxy_set_header User-Agent "RaceNav TileProxy/1.0";
proxy_ssl_server_name on;
proxy_ssl_protocols TLSv1.2 TLSv1.3;
proxy_http_version 1.1;
proxy_set_header Connection "";

# ============================================================
#  Catalog endpoint
# ============================================================

location = /api/tiles/catalog {
    alias /etc/nginx/racenav/catalog.json;
    default_type application/json;
    add_header Cache-Control "public, max-age=300";
    add_header Access-Control-Allow-Origin *;
}

# ============================================================
#  BASE MAPS
# ============================================================

# --- osm: OpenStreetMap (a/b/c round-robin) ---
location ~ ^/tiles/osm/(\d+)/(\d+)/(\d+)\.png$ {
    set $z $1; set $x $2; set $y $3;
    set_by_lua_block $sub { local subs={"a","b","c"} return subs[math.random(#subs)] }
    proxy_pass https://$sub.tile.openstreetmap.org/$z/$x/$y.png;
    proxy_set_header Host $sub.tile.openstreetmap.org;
    proxy_set_header User-Agent "RaceNav TileProxy/1.0";
    proxy_cache tilecache;
    proxy_cache_valid 200 24h;
    proxy_cache_key "$uri";
    proxy_ssl_server_name on;
    limit_req zone=tilerl burst=200 nodelay;
}

# --- satellite: ESRI World Imagery (z/y/x order!) ---
location ~ ^/tiles/satellite/(\d+)/(\d+)/(\d+)\.png$ {
    set $z $1; set $x $2; set $y $3;
