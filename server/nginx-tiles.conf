    proxy_pass https://tiles.windy.com/tiles/v8.1/darkmap/$z/$x/$y.png;
    proxy_set_header Host tiles.windy.com;
    proxy_set_header User-Agent "RaceNav TileProxy/1.0";
    proxy_cache tilecache;
    proxy_cache_valid 200 24h;
    proxy_cache_key "$uri";
    proxy_ssl_server_name on;
    limit_req zone=tilerl burst=200 nodelay;
}

