# --- yandex_hybrid: Яндекс Гибрид overlay (подписи, vec01-vec04 round-robin) ---
location ~ ^/tiles/yandex_hybrid/(\d+)/(\d+)/(\d+)\.png$ {
    set $z $1; set $x $2; set $y $3;
    set_by_lua_block $vec { return "vec0" .. math.random(1,4) }
    proxy_pass https://$vec.maps.yandex.net/tiles?l=skl&x=$x&y=$y&z=$z&lang=ru_RU&projection=web_mercator;
    proxy_set_header Host $vec.maps.yandex.net;
    proxy_set_header User-Agent "RaceNav TileProxy/1.0";
    proxy_cache tilecache;
    proxy_cache_valid 200 24h;
    proxy_cache_key "$uri";
    proxy_ssl_server_name on;
    limit_req zone=tilerl burst=200 nodelay;
}
