# --- labels_light: Подписи (светлые, a/b/c round-robin) ---
location ~ ^/tiles/labels_light/(\d+)/(\d+)/(\d+)\.png$ {
    set $z $1; set $x $2; set $y $3;
    set_by_lua_block $sub { local subs={"a","b","c"} return subs[math.random(#subs)] }
    proxy_pass https://$sub.basemaps.cartocdn.com/light_only_labels/$z/$x/$y.png;
    proxy_set_header Host $sub.basemaps.cartocdn.com;
    proxy_set_header User-Agent "RaceNav TileProxy/1.0";
    proxy_cache tilecache;
    proxy_cache_valid 200 24h;
    proxy_cache_key "$uri";
    proxy_ssl_server_name on;
    limit_req zone=tilerl burst=200 nodelay;
}

